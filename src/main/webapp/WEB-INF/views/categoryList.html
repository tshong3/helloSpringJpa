<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>카테고리 목록</title>
</head>
<body>
<p th:if="${successMessage}" th:text="${successMessage}"></p>
<p th:if="${errorMessage}" th:text="${errorMessage}"></p>

<h2>카테고리 목록</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>이름</th>
        <th>삭제</th>
    </tr>

    <tr th:each="cat : ${categories}">
        <td th:text="${cat.id}"></td>
        <td th:text="${cat.name}"></td>
        <td>
            <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post">
                <button type="submit">삭제</button>
            </form>
        </td>
    </tr>
</table>
<footer>
    <p th:text="${'실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')} + ' |  학번: 2371080  |  이름: 홍태성'"></p>
</footer>
</body>
</html>
